<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>81iki</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    background:#f8f9fa;
    color:#202122;
}

header{
    background:white;
    border-bottom:1px solid #c8ccd1;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:32px;
    font-weight:bold;
}

.logo span{
    color:#3366cc;
}

.search{
    width:320px;
}

.search input{
    width:100%;
    padding:10px;
    border:1px solid #a2a9b1;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px;
}

h1{
    margin-bottom:10px;
}

.subtitle{
    color:#555;
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:20px;
}

.card{
    background:white;
    border:1px solid #c8ccd1;
    border-radius:6px;
    transition:.2s;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 6px 18px rgba(0,0,0,.12);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.content{
    padding:18px;
}

.content h2{
    margin-bottom:10px;
    font-size:22px;
}

.content p{
    color:#555;
    line-height:1.5;
    margin-bottom:18px;
}

.content a{
    display:inline-block;
    text-decoration:none;
    color:white;
    background:#3366cc;
    padding:10px 18px;
    border-radius:4px;
}

.content a:hover{
    background:#2854b8;
}

footer{
    margin-top:60px;
    text-align:center;
    color:#666;
}
</style>

</head>
<body>

<header>

<div class="logo">
<span>My</span>Wiki
</div>

<div class="search">
<input id="search" type="text" placeholder="Search pages...">
</div>

</header>

<div class="container">

<h1>Welcome to My Wiki</h1>

<p class="subtitle">
Browse every article currently available.
</p>

<div class="grid" id="articles">

<div class="card">
<img src="https://picsum.photos/400/200?2">
<div class="content">
<h2>We 81</h2>
<p>The history and members of We 81.</p>
<a href="We 81 wiki.html">Read article</a>
</div>
</div>

</div>

<footer>

1 Article • Community Wiki

</footer>

</div>

<script>
const search = document.getElementById("search");
const cards = document.querySelectorAll(".card");

search.addEventListener("input", () => {

const value = search.value.toLowerCase();

cards.forEach(card => {

const title = card.querySelector("h2").textContent.toLowerCase();
const text = card.querySelector("p").textContent.toLowerCase();

card.style.display =
title.includes(value) || text.includes(value)
? "block"
: "none";

});

});
</script>

</body>
</html>
